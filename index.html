<style>

body {
    font-size: 16px; /* Podstawa dla czytelności */
}

button, a.button {
    padding: 12px 20px; /* Większe obszary kliknięcia */
    display: inline-block;
}

/* Styl dla komputerów i większych ekranów */
.kontener {
    width: 80%;
    margin: 0 auto;
}

/* Styl dla telefonów (ekrany o szerokości do 768 pikseli) */
@media (max-width: 768px) {
    .kontener {
        width: 100%; /* Rozciąga stronę na cały ekran telefonu */
    }
}

img, video {
    max-width: 100%;
    height: auto;
    display: block;
}

body {
    margin: 0;
    font-family: 'Arial';
    background: url(tlo.png) no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
}

/* subtelne gwiazdy */
body::after {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.08;
    animation: starsMove 120s linear infinite;
    z-index: -1;
}

@keyframes starsMove {
    from { transform: translate(0,0); }
    to { transform: translate(-500px,-500px); }
}

/* przyciemnienie tła */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
}

/* tytuł */
h1 {
    font-size: 90px;
    letter-spacing: 8px;
    margin-top: 40px;
    text-shadow: 0 0 25px #00ccff;
}

/* podtytuł */
.subtitle {
    letter-spacing: 3px;
    margin-bottom: 50px;
    opacity: 0.8;
/*    text-align: left; */
    margin: 40px;
}

/* kafelki */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    position: relative;
    overflow: hidden;

    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 15px;
    padding: 30px;
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.4);

    transition: 0.3s;

    /* animacja wejścia */
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s forwards;
}

/* opóźnienia animacji */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }
.card:nth-child(6) { animation-delay: 0.6s; }
.card:nth-child(7) { animation-delay: 0.7s; }
.card:nth-child(8) { animation-delay: 0.8s; }
.card:nth-child(9) { animation-delay: 0.9s; }
.card:nth-child(10) { animation-delay: 1s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* glow efekt */
.card::before {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(0,204,255,0.25);
    border-radius: 50%;
    transition: 0.4s;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.card:hover::before {
    width: 200px;
    height: 200px;
}

/* hover */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00ccff;
}

/* tekst */
.card h2 {
    font-size: 18px;
    margin-top: 10px;
    position: relative;
    z-index: 2;
}

/* stopka */
.footer {
    margin-top: 40px;
    font-size: 12px;
    opacity: 0.7;
    letter-spacing: 3px;
}

</style>
